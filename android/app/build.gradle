apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: 'com.google.gms.google-services'

project.ext.vectoricons = [
    iconFontNames: [ 'MaterialIcons.ttf', 'MaterialCommunityIcons.ttf', 'Feather.ttf' ]
]

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

react {
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

// Тук се зареждат паролите от keystore.properties
def keystorePropertiesFile = file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def releaseStoreFile = keystoreProperties['MYAPP_UPLOAD_STORE_FILE'] ?: System.getenv('MYAPP_UPLOAD_STORE_FILE')
def releaseStorePassword = keystoreProperties['MYAPP_UPLOAD_STORE_PASSWORD'] ?: System.getenv('MYAPP_UPLOAD_STORE_PASSWORD')
def releaseKeyAlias = keystoreProperties['MYAPP_UPLOAD_KEY_ALIAS'] ?: System.getenv('MYAPP_UPLOAD_KEY_ALIAS')
def releaseKeyPassword = keystoreProperties['MYAPP_UPLOAD_KEY_PASSWORD'] ?: System.getenv('MYAPP_UPLOAD_KEY_PASSWORD')

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.freetravelapp3"
    defaultConfig {
        applicationId "com.freetravelapp3"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 62
        versionName "1.2.4"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }

        release {
            if (releaseStoreFile) {
                storeFile file(releaseStoreFile)
            }
            if (releaseStorePassword) {
                storePassword releaseStorePassword
            }
            if (releaseKeyAlias) {
                keyAlias releaseKeyAlias
            }
            if (releaseKeyPassword) {
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

tasks.configureEach { task ->
    if (task.name.startsWith("generate") && task.name.endsWith("LintReportModel")) {
        task.dependsOn("copyReactNativeVectorIconFonts")
    }
}
